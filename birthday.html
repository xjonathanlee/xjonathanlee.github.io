<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: img/birthday/targets.mind;"  mindar-image="filterMinCF:0.1; filterBeta: 10" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>

        <a-asset-item id="avatarModel" src="img/birthday/birthday_M.glb"></a-asset-item>
        <a-asset-item id="avatarModel2" src="img/birthday/birthday_MSG.glb"></a-asset-item>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="90 0 0 " position="0 0 0.2" scale="1 1 1" src="#avatarModel" animation="property: position; to: 0 .15 0.1; dur: 3000; easing: easeInOutQuad; loop: true; dir: alternate">
          <a-gltf-model rotation="45 0 0 " position="0 0 20" scale=".5 .5 .5" src="#avatarModel2" animation="property: position; to: 0 .15 0.1; dur: 10000; easing: easeInOutQuad; loop: true; dir: alternate"></a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
